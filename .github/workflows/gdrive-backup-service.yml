name: Сервис - Бэкап на Диск Google

on:
  push:
    branches:
      - main
  workflow_dispatch: # Кнопка ручного запуска

jobs:
  run_backup:
    runs-on: ubuntu-latest
    steps:
      - name: Скачивание репозитория
        uses: actions/checkout@v4

      - name: Установка Rclone из репозитория Ubuntu
        run: |
          sudo apt-get update
          sudo apt-get install -y rclone

      - name: Настройка чистой авторизации Google через Токен
        run: |
          mkdir -p ~/.config/rclone
          
          # Собираем файл конфигурации на лету из секретов GitHub
          cat << 'EOF' > ~/.config/rclone/rclone.conf
          [gdrive]
          type = drive
          scope = drive
          token = ${{ secrets.RCLONE_CONFIG_DATA }}
          EOF

      - name: Создание уникального архива сайта во временной папке
        run: |
          FILENAME="backup-$(date +%Y%m%d%H%M%S).tar.gz"
          tar --exclude='.git' --exclude='.github' -czf "/tmp/$FILENAME" .
          echo "BACKUP_FILENAME=$FILENAME" >> $GITHUB_ENV

      - name: Отправка архива на Google Диск
        run: rclone copy "/tmp/${{ env.BACKUP_FILENAME }}" gdrive:GitHub_Backups
