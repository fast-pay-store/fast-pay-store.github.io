name: Сервис - Уведомления в Telegram

on:
  workflow_run:
    workflows:
      - "Сервис - Бэкап на Диск Google"
      - "Поисковик - Яндекс"
      - "Поисковик - Google"
      - "Поисковик - Bing"
      - "Сервис - Тестировщик ссылок"
    types:
      - completed

jobs:
  send_telegram_status:
    runs-on: ubuntu-latest
    steps:
      - name: Анализ и отправка отчета
        run: |
          # 1. Собираем данные без сложных символов экранирования
          WORKFLOW_NAME="${{ github.event.workflow_run.name }}"
          CONCLUSION="${{ github.event.workflow_run.conclusion }}"
          RUN_ID="${{ github.event.workflow_run.id }}"
          REPO_URL="https://github.com{{ github.repository }}"
          LOG_URL="${REPO_URL}/actions/runs/${RUN_ID}"

          # 2. Определяем статус и иконку
          if [ "$CONCLUSION" = "success" ]; then
            STATUS_EMOJI="✅"
            STATUS_TEXT="Успешно завершен"
          else
            STATUS_EMOJI="❌"
            STATUS_TEXT="Завершился с ошибкой!"
          fi

          # 3. Составляем текстовое сообщение без разметки Markdown
          MESSAGE="${STATUS_EMOJI} Робот: ${WORKFLOW_NAME}
          Статус: ${STATUS_TEXT}
          
          Логи сборки: ${LOG_URL}"

          # 4. Отправляем через чистый JSON-формат (защита от сломанных URL)
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\": \"${{ secrets.TELEGRAM_CHAT_ID }}\", \"text\": \"${MESSAGE}\"}"
