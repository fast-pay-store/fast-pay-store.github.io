name: Сервис - Тестировщик ссылок

on:
  push:
    branches:
      - main
  workflow_dispatch: # Кнопка ручного запуска

jobs:
  link_checker:
    runs-on: ubuntu-latest
    steps:
      - name: Скачивание репозитория
        uses: actions/checkout@v4

      - name: Проверка всех ссылок на сайте
        uses: lycheeverse/lychee-action@v2
        with:
          # Теперь робот принимает и стандартные ответы (200), и коды защиты (403),
          # но мгновенно выдаст ошибку, если страница реально сломана (404)
          args: --verbose --no-progress --accept "200..249, 403" './**/*.html'
          output: ./lychee-report.md

      - name: Отправка отчета при обнаружении поломок
        if: env.lychee_exit_code != 0
        run: |
          echo "Критическая ошибка: На сайте обнаружены реально сломанные ссылки!"
          echo "Подробный отчет сохранен во вкладке Actions этого запуска."
