name: Сервис - Вставка виджетов и контактов

on:
  push:
    branches:
      - main
    paths:
      - '**/index.html'
  workflow_dispatch:

# Включаем принудительное выполнение на Node 24, чтобы убрать предупреждения
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  inject_widgets:
    runs-on: ubuntu-latest
    steps:
      - name: Скачивание репозитория
        uses: actions/checkout@v4

      - name: Безопасное подключение addons.js в папки ботов
        shell: bash
        run: |
          TARGET_FOLDERS=("shoptitans-bot" "bot-dungeon-crusher" "trofei-rybalka2")
          INJECT_LINE='<script src="./addons.js"></script>'

          for folder in "${TARGET_FOLDERS[@]}"; do
              file="./$folder/index.html"
              
              if [ -f "$file" ]; then
                  sed -i '/addons.js/d' "$file"
                  sed -i '/rel="canonical"/d' "$file"
                  
                  echo "Безопасно подключаем addons.js в папку: $folder"
                  perl -i -pe "s|(<\/body>)|${INJECT_LINE}\1|gi" "$file"
              fi
          done

      - name: Сохранение изменений в репозиторий
        run: |
          if [[ `git status --porcelain` ]]; then
            git config --global user.name 'github-actions[bot]'
            git config --global user.email '41898282+github-actions[bot]@://github.com'
            git add .
            git commit -m "Очистка логов и привязка addons.js"
            git push
          else
            echo "Изменений нет."
          fi
