name: Сервис - Вставка виджетов и контактов

on:
  push:
    branches:
      - main
    paths:
      - '**/index.html'
  workflow_dispatch:

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true # Полностью убирает предупреждение Node.js из логов

jobs:
  inject_widgets:
    runs-on: ubuntu-latest
    steps:
      - name: Скачивание репозитория
        uses: actions/checkout@v4

      - name: Безопасное подключение скрипта через Python
        shell: python
        run: |
          import os

          target_folders = ["shoptitans-bot", "bot-dungeon-crusher", "trofei-rybalka2"]
          inject_line = '<script src="./addons.js"></script>'

          for folder in target_folders:
              file_path = f"./{folder}/index.html"
              if os.path.exists(file_path):
                  with open(file_path, "r", encoding="utf-8") as f:
                      content = f.read()
                  
                  # Полностью очищаем любые старые кривые вставки, если они были
                  content = content.replace(inject_line, "")
                  
                  # Находим самый последний тег закрытия страницы (независимо от регистра)
                  if "</body>" in content:
                      content = content.replace("</body>", f"{inject_line}</body>")
                  elif "</BODY>" in content:
                      content = content.replace("</BODY>", f"{inject_line}</BODY>")
                  
                  with open(file_path, "w", encoding="utf-8") as f:
                      f.write(content)
                  print(f"Файл в папке {folder} успешно обработан.")

      - name: Сохранение изменений в репозиторий
        run: |
          if [[ `git status --porcelain` ]]; then
            git config --global user.name 'github-actions[bot]'
            git config --global user.email '41898282+github-actions[bot]@://github.com'
            git add .
            git commit -m "Безопасное восстановление кода и привязка чата"
            git push
          else
            echo "Изменений нет."
          fi
