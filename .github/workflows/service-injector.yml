name: Сервис - Вставка виджетов и контактов

on:
  push:
    branches:
      - main
    paths:
      - '**/index.html'
  workflow_dispatch:

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true # Полностью убирает предупреждения Node.js из логов

jobs:
  inject_widgets:
    runs-on: ubuntu-latest
    steps:
      - name: Скачивание репозитория
        uses: actions/checkout@v4

      - name: Безопасное подключение скрипта и Фавикона через Python
        shell: python
        run: |
          import os

          # Жесткий список папок для обработки
          target_folders = ["shoptitans-bot", "bot-dungeon-crusher", "trofei-rybalka2"]
          
          inject_line = '<script src="./addons.js"></script>'
          favicon_line = '    <link rel="icon" type="image/png" href="https://fast-pay-store.github.io" />'

          for folder in target_folders:
              file_path = f"./{folder}/index.html"
              if os.path.exists(file_path):
                  with open(file_path, "r", encoding="utf-8") as f:
                      content = f.read()
                  
                  # Очищаем старые вставки скрипта и фавикона, чтобы не дублировать код
                  content = content.replace(inject_line, "")
                  content = content.replace(favicon_line + "\n", "")
                  
                  # 1. Вставляем иконку в самое начало блока <head>
                  if "<head>" in content:
                      content = content.replace("<head>", f"<head>\n{favicon_line}")
                  elif "<HEAD>" in content:
                      content = content.replace("<HEAD>", f"<HEAD>\n{favicon_line}")
                  
                  # 2. Вставляем скрипт кнопок перед закрывающим тегом </body>
                  if "</body>" in content:
                      content = content.replace("</body>", f"{inject_line}</body>")
                  elif "</BODY>" in content:
                      content = content.replace("</BODY>", f"{inject_line}</BODY>")
                  
                  with open(file_path, "w", encoding="utf-8") as f:
                      f.write(content)
                  print(f"Иконка и кнопки успешно вшиты в папку {folder}")

      - name: Сохранение изменений в репозиторий
        run: |
          if [[ `git status --porcelain` ]]; then
            git config --global user.name 'github-actions[bot]'
            git config --global user.email '41898282+github-actions[bot]@://github.com'
            git add .
            git commit -m "Автоматическое вшивание иконок favicon и контактов"
            git push
          else
            echo "Изменений нет."
          fi
