name: Сервис - Вставка виджетов и контактов

on:
  push:
    branches:
      - main
    paths:
      - '**/index.html'
  workflow_dispatch:

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  inject_widgets:
    runs-on: ubuntu-latest
    steps:
      - name: Скачивание репозитория
        uses: actions/checkout@v4

      - name: Безопасное подключение скрипта и Фавикона через Python
        shell: python
        run: |
          import os
          import re

          # СПИСОК ПАПОК ДЛЯ ВСТАВКИ (Наглядный столбик, добавляйте новые строки сюда)
          target_folders = [
              "shoptitans-bot",
              "bot-dungeon-crusher",
              "trofei-rybalka2",
          ]
          
          inject_line = '<script src="./addons.js"></script>'
          favicon_line = '    <link rel="icon" type="image/png" href="https://github.io" />'

          for folder in target_folders:
              file_path = f"./{folder}/index.html"
              if os.path.exists(file_path):
                  with open(file_path, "r", encoding="utf-8") as f:
                      content = f.read()
                  
                  # Полностью вычищаем старые вставки, чтобы избежать дублирования
                  content = content.replace(inject_line, "")
                  content = re.sub(r'^\s*<link rel="icon".*?href=".*?favicon\.png".*?>\n?', '', content, flags=re.MULTILINE | re.IGNORECASE)
                  
                  # 1. Железобетонный поиск тега <head> в любом регистре (даже <HEAD> или <head class="...">)
                  head_match = re.search(r'(<head[^>]*>)', content, re.IGNORECASE)
                  if head_match:
                      start_head = head_match.group(1)
                      content = content.replace(start_head, f"{start_head}\n{favicon_line}")
                  
                  # 2. Железобетонный поиск закрывающего тега </body>
                  body_match = re.search(r'(<\/body>)', content, re.IGNORECASE)
                  if body_match:
                      end_body = body_match.group(1)
                      content = content.replace(end_body, f"{inject_line}{end_body}")
                  
                  with open(file_path, "w", encoding="utf-8") as f:
                      f.write(content)
                  print(f"Успешно: иконка и кнопки вшиты в папку -> {folder}")

      - name: Сохранение изменений в репозиторий
        run: |
          if [[ `git status --porcelain` ]]; then
            git config --global user.name 'github-actions[bot]'
            git config --global user.email '41898282+github-actions[bot]@://github.com'
            git add .
            git commit -m "Универсальное вшивание иконок и контактов по списку"
            git push
          else
            echo "Изменений в файлах нет."
          fi
