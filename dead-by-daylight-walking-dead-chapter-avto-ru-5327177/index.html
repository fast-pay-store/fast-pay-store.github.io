* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px 16px; }

.detail-content { padding: 18px; font-size: 14px; line-height: 1.7; color: var(--text-muted); white-space: pre-wrap; word-wrap: break-word; }
.detail-content strong { color: var(--text); font-weight: 700; }
.detail-content a { color: var(--primary); text-decoration: none; font-weight: 600; }
.detail-content a:hover { text-decoration: underline; }
.warning-box { background: linear-gradient(135deg, #fff3e0 0%, #ffe0b2 100%); border: 1px solid #ffcc80; border-radius: var(--radius-sm); padding: 16px; margin-top: 12px; font-size: 13px; line-height: 1.7; color: #e65100; position: relative; }

.buy-btn { display: block; width: 100%; padding: 18px 24px; background: linear-gradient(135deg, var(--success) 0%, var(--success-end) 100%); color: white; font-size: 18px; font-weight: 800; text-align: center; text-decoration: none; border-radius: var(--radius-sm); border: none; cursor: pointer; box-shadow: 0 6px 20px rgba(0,176,155,0.4); transition: var(--transition); position: relative; overflow: hidden; letter-spacing: 0.5px; text-transform: uppercase; }

.buy-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(0,176,155,0.5); }
.buy-btn:hover::before { left: 100%; }
.buy-btn:active { transform: translateY(0) scale(0.99); box-shadow: 0 4px 12px rgba(0,176,155,0.4); }
.disclaimer { text-align: center; margin-top: 16px; font-size: 11px; color: var(--text-muted); opacity: 0.7; line-height: 1.5; }

  .content { padding: 18px; }
  .buy-btn { padding: 16px 18px; font-size: 16px; border-radius: 12px; }
  .guarantee { padding: 14px 18px 18px; }
}
