<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Страница не найдена — Fast-Pay Store</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: #121214; 
            color: #e1e1e6; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            padding: 20px;
            text-align: center;
        }
        .error-code { 
            font-size: 8rem; 
            font-weight: 800; 
            margin: 0; 
            background: linear-gradient(45deg, #0066cc, #00ccff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
        }
        h1 { font-size: 2rem; margin: 10px 0 20px 0; color: #fff; }
        p { font-size: 1.1rem; color: #a8a8b3; max-width: 500px; margin-bottom: 40px; line-height: 1.5; }
        .btn-home { 
            text-decoration: none; 
            background: linear-gradient(135deg, #0066cc 0%, #004499 100%); 
            color: #fff; 
            padding: 15px 35px; 
            font-weight: bold; 
            font-size: 1.1rem; 
            border-radius: 8px; 
            box-shadow: 0 4px 15px rgba(0, 102, 204, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-home:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 6px 20px rgba(0, 102, 204, 0.5);
        }
        .btn-home:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="error-code">404</div>
    <h1>Упс... Локация не найдена</h1>
    <p>Похоже, этот бот переехал или в адресе страницы закралась опечатка. Не паникуйте, все рабочие скрипты и программы ждут вас на главной странице!</p>
    
    <a href="https://fast-pay-store.github.io/" class="btn-home">Перейти на главную страницу</a>

</body>
</html>
